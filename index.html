<!-- ===================== AJOUT CHAT PRO (FICHIER + AUDIO) ===================== -->
<script>

// ===== FICHIER =====
window.sendFile = async function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(e) {
    const fileData = e.target.result;

    if (activeConvType === 'group') {
      await push(ref(db, 'groupChat'), {
        ts: serverTimestamp(),
        senderId: currentUser.uid,
        senderName: currentUConf.name,
        file: fileData,
        fileName: file.name
      });
    } else {
      const convId = getConvId(currentUser.uid, activeConvUserId);
      await push(ref(db, `privateMessages/${convId}`), {
        ts: serverTimestamp(),
        senderId: currentUser.uid,
        receiverId: activeConvUserId,
        file: fileData,
        fileName: file.name
      });
    }
  };

  reader.readAsDataURL(file);
};


// ===== AUDIO =====
let mediaRecorder;
let audioChunks = [];

window.toggleRecording = async function() {

  if (!mediaRecorder || mediaRecorder.state === "inactive") {

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();

    audioChunks = [];

    mediaRecorder.ondataavailable = e => {
      audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });

      const reader = new FileReader();
      reader.onload = async function(e) {
        const audioData = e.target.result;

        if (activeConvType === 'group') {
          await push(ref(db, 'groupChat'), {
            ts: serverTimestamp(),
            senderId: currentUser.uid,
            senderName: currentUConf.name,
            audio: audioData
          });
        } else {
          const convId = getConvId(currentUser.uid, activeConvUserId);
          await push(ref(db, `privateMessages/${convId}`), {
            ts: serverTimestamp(),
            senderId: currentUser.uid,
            receiverId: activeConvUserId,
            audio: audioData
          });
        }
      };

      reader.readAsDataURL(blob);
    };

    document.getElementById("recordBtn").innerText = "⏹️";

  } else {
    mediaRecorder.stop();
    document.getElementById("recordBtn").innerText = "🎤";
  }
};


// ===== PATCH AFFICHAGE =====
const oldBuild = buildMessagesHTML;

buildMessagesHTML = function(msgs, otherUid) {
  return msgs.map(msg => {

    let content = '';

    if (msg.text) {
      content = esc(msg.text);
    } else if (msg.file) {
      content = `<a href="${msg.file}" download="${msg.fileName}">📎 ${msg.fileName}</a>`;
    } else if (msg.audio) {
      content = `<audio controls src="${msg.audio}"></audio>`;
    }

    msg.text = content;

    return oldBuild([msg], otherUid);

  }).join('');
};

</script>

<!-- ===== BOUTONS CHAT ===== -->
<script>
setTimeout(() => {
  const input = document.getElementById('convInput');
  if (!input) return;

  const parent = input.parentElement;

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.style.display = 'none';
  fileInput.onchange = sendFile;

  const fileBtn = document.createElement('button');
  fileBtn.innerText = '📎';
  fileBtn.onclick = () => fileInput.click();

  const audioBtn = document.createElement('button');
  audioBtn.innerText = '🎤';
  audioBtn.id = 'recordBtn';
  audioBtn.onclick = toggleRecording;

  parent.insertBefore(fileInput, input);
  parent.insertBefore(fileBtn, input);
  parent.insertBefore(audioBtn, input);

}, 2000);
</script>
