
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techniciens AP Industrie Eau Vitale</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #0f1218;
  --surface: #151a24;
  --card: #1c2333;
  --border: #252e42;
  --border2: #2d3a52;
  --text: #dce6f5;
  --muted: #5a6a8a;
  --muted2: #7a8faa;
  --soufflage: #00d4ff;
  --remplissage: #00ff94;
  --etiquette: #ffb800;
  --emballage: #ff6b35;
  --admin: #c084fc;
  --ok: #22c55e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--font-body); background:var(--bg); color:var(--text); font-size:14px; }

/* ══════════ LOADER ══════════ */
#loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999;
}
.loader-logo { font-family:var(--font-display); font-size:48px; font-weight:900; letter-spacing:2px; margin-bottom:24px; text-align:center; line-height:1.2; }
.loader-logo span { color:var(--soufflage); }
.loader-logo small { font-size:16px; display:block; color:var(--muted); font-weight:400; letter-spacing:2px; margin-top:4px; }
.loader-bar { width:200px; height:3px; background:var(--surface); border-radius:2px; overflow:hidden; }
.loader-fill { height:100%; background:var(--soufflage); border-radius:2px; animation:loadFill 1.5s ease forwards; }
.loader-txt { font-size:12px; color:var(--muted); margin-top:12px; letter-spacing:.1em; }
@keyframes loadFill { from{width:0} to{width:100%} }

/* ══════════ LOGIN ══════════ */
#loginScreen {
  position:fixed; inset:0; display:none;
  align-items:center; justify-content:center;
  background:var(--bg); z-index:1000;
}
#loginScreen.show { display:flex; }
#loginScreen::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%, rgba(0,212,255,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 50%, rgba(0,255,148,.05) 0%, transparent 60%);
}
.login-box {
  position:relative; width:440px;
  background:var(--card); border:1px solid var(--border2);
  border-radius:16px; padding:44px 40px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  animation:fadeUp .4s ease;
}
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .brand { font-family:var(--font-display); font-size:40px; font-weight:900; letter-spacing:1px; line-height:1.2; }
.login-logo .brand span { color:var(--soufflage); }
.login-logo .brand small { font-size:14px; display:block; color:var(--muted); font-weight:400; letter-spacing:2px; margin-top:4px; }
.login-logo .sub { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-top:8px; }

.login-label { font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:8px; }
.login-input {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:12px 16px;
  font-family:var(--font-body); font-size:15px; color:var(--text);
  outline:none; transition:border-color .2s, box-shadow .2s; margin-bottom:16px;
}
.login-input:focus { border-color:var(--soufflage); box-shadow:0 0 0 3px rgba(0,212,255,.1); }

.user-select { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
.user-chip {
  padding:10px 12px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface); cursor:pointer; transition:all .2s; text-align:left;
}
.user-chip:hover { border-color:var(--border2); }
.user-chip.selected { border-color:var(--soufflage); background:rgba(0,212,255,.08); }
.user-chip .chip-name { font-weight:600; font-size:13px; }
.user-chip .chip-role { font-size:11px; color:var(--muted); margin-top:2px; }
.chip-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }

.forgot-password {
  text-align: right;
  margin-bottom: 16px;
}
.forgot-link {
  color: var(--soufflage);
  font-size: 12px;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s;
}
.forgot-link:hover {
  opacity: 0.8;
  text-decoration: underline;
}

.btn-login {
  width:100%; padding:14px; background:var(--soufflage); color:#000;
  border:none; border-radius:8px; font-family:var(--font-display);
  font-size:16px; font-weight:700; letter-spacing:.05em; cursor:pointer; transition:all .2s;
}
.btn-login:hover { background:#33dcff; transform:translateY(-1px); }
.btn-login:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-secondary {
  width:100%; padding:12px; background:transparent; color:var(--text);
  border:1px solid var(--border); border-radius:8px; font-family:var(--font-display);
  font-size:14px; font-weight:600; letter-spacing:.05em; cursor:pointer; transition:all .2s; margin-top:10px;
}
.btn-secondary:hover { border-color:var(--border2); background:var(--surface); }
.login-err { color:var(--danger); font-size:12px; text-align:center; margin:10px 0; min-height:18px; }
.login-success { color:var(--ok); font-size:12px; text-align:center; margin:10px 0; min-height:18px; }

/* RESET PASSWORD MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal.show {
  display: flex;
}
.modal-content {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 32px;
  width: 90%;
  max-width: 400px;
  animation: fadeUp 0.3s ease;
}
.modal-content h3 {
  font-family: var(--font-display);
  font-size: 24px;
  margin-bottom: 16px;
}
.modal-content p {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 20px;
}
.modal-close {
  float: right;
  font-size: 24px;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.2s;
}
.modal-close:hover {
  color: var(--text);
}

/* ══════════ APP LAYOUT (identique à l'original) ══════════ */
#app {
  display:none; height:100vh;
  grid-template-columns:64px 220px 1fr;
  grid-template-rows:56px 1fr;
  grid-template-areas:"icon topbar topbar" "icon sidebar main";
}
#app.show { display:grid; }

/* ICON BAR */
.icon-bar {
  grid-area:icon; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; z-index:10;
}
.brand-mini { font-family:var(--font-display); font-size:22px; font-weight:900; color:var(--soufflage); margin-bottom:16px; }
.nav-icon {
  width:42px; height:42px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:19px; cursor:pointer; transition:all .2s;
  color:var(--muted); background:none; border:none; position:relative;
}
.nav-icon:hover { background:var(--surface); color:var(--text); }
.nav-icon.active { background:var(--surface); color:var(--soufflage); }
.nav-icon .nbadge {
  position:absolute; top:5px; right:5px; width:8px; height:8px;
  background:var(--danger); border-radius:50%; border:2px solid var(--bg2);
}

/* TOPBAR */
.topbar {
  grid-area:topbar; background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 20px 0 0; z-index:9;
}
.topbar-title { font-family:var(--font-display); font-size:20px; font-weight:700; letter-spacing:.05em; padding:0 20px; }
.topbar-date { font-size:12px; color:var(--muted); padding:0 20px; border-left:1px solid var(--border); }
.topbar-right { display:flex; align-items:center; gap:12px; }

.presence-pills { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.presence-pill {
  display:flex; align-items:center; gap:5px; padding:3px 9px;
  border-radius:20px; border:1px solid var(--border);
  font-size:11px; font-weight:500; background:var(--surface); transition:all .3s;
}
.presence-pill.online { border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.08); color:var(--ok); }
.pdot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
.presence-pill.online .pdot { background:var(--ok); box-shadow:0 0 6px var(--ok); animation:pulse 2s infinite; }

.user-badge {
  display:flex; align-items:center; gap:10px; padding:5px 12px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px; cursor:pointer; transition:all .2s;
}
.user-badge:hover { border-color:var(--danger); }
.udot { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#000; }
.uname { font-size:13px; font-weight:600; }
.urole { font-size:11px; color:var(--muted); }

/* SIDEBAR */
.sidebar { grid-area:sidebar; background:var(--bg2); border-right:1px solid var(--border); overflow-y:auto; padding:12px 0; }
.sidebar-label { font-size:10px; text-transform:uppercase; letter-spacing:.15em; color:var(--muted); padding:8px 18px 5px; }
.sidebar-item {
  display:flex; align-items:center; gap:10px; padding:9px 18px;
  cursor:pointer; transition:all .15s; font-size:13px; font-weight:500;
  color:var(--muted2); border-left:2px solid transparent; position:relative;
}
.sidebar-item:hover { background:var(--surface); color:var(--text); }
.sidebar-item.active { background:var(--surface); color:var(--text); border-left-color:var(--soufflage); }
.si-icon { font-size:15px; width:20px; text-align:center; }
.si-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; }
.machine-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sidebar-divider { height:1px; background:var(--border); margin:10px 18px; }

/* MAIN (identique à l'original) */
.main { grid-area:main; overflow-y:auto; background:var(--bg); }
.page { display:none; padding:24px; animation:fadeIn .25s ease; }
.page.active { display:block; }

/* PAGE HEADER */
.page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
.page-header h2 { font-family:var(--font-display); font-size:28px; font-weight:900; letter-spacing:.02em; }
.page-header p { color:var(--muted); font-size:13px; margin-top:4px; }

/* CARD */
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
.card-title { font-family:var(--font-display); font-size:15px; font-weight:700; letter-spacing:.04em; margin-bottom:16px; display:flex; align-items:center; gap:8px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; position:relative; }
.stat-box::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; border-radius:0 0 10px 10px; }
.stat-box.s1::after{background:var(--soufflage)} .stat-box.s2::after{background:var(--remplissage)}
.stat-box.s3::after{background:var(--etiquette)} .stat-box.s4::after{background:var(--emballage)}
.sval { font-family:var(--font-display); font-size:30px; font-weight:900; line-height:1; }
.slabel { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
.ssub { font-size:11px; color:var(--muted); margin-top:6px; }

/* MACHINE CARDS */
.machines-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:18px; }
.machine-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; position:relative; overflow:hidden; transition:border-color .2s; }
.machine-card:hover { border-color:var(--border2); }
.mc-accent { position:absolute; top:0; left:0; right:0; height:3px; }
.mc-soufflage .mc-accent{background:var(--soufflage)} .mc-remplissage .mc-accent{background:var(--remplissage)}
.mc-etiquette .mc-accent{background:var(--etiquette)} .mc-emballage .mc-accent{background:var(--emballage)}
.mc-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
.mc-name { font-family:var(--font-display); font-size:17px; font-weight:700; letter-spacing:.03em; }
.mc-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.status-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; display:flex; align-items:center; gap:5px; white-space:nowrap; }
.status-badge.ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.status-badge.warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.status-badge.danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.sdot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.mc-metrics { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.mm-label { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:3px; }
.mm-val { font-family:var(--font-display); font-size:22px; font-weight:700; }
.mc-soufflage .mm-val{color:var(--soufflage)} .mc-remplissage .mm-val{color:var(--remplissage)}
.mc-etiquette .mm-val{color:var(--etiquette)} .mc-emballage .mm-val{color:var(--emballage)}
.mc-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); }

/* FORM */
.form-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-label { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
.form-input,.form-select,.form-textarea {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; font-family:var(--font-body); font-size:14px; color:var(--text);
  outline:none; transition:border-color .2s, box-shadow .2s; width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--soufflage); box-shadow:0 0 0 2px rgba(0,212,255,.1); }
.form-select option { background:var(--surface); }
.form-textarea { resize:vertical; min-height:80px; }

.alert-toggle {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2);
  border-radius:8px; font-size:13px; cursor:pointer; transition:all .2s; margin-bottom:16px;
}
.toggle-switch {
  width:36px; height:20px; background:var(--surface); border-radius:10px;
  position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; border:none;
}
.toggle-switch.on { background:var(--danger); }
.toggle-switch::after { content:''; position:absolute; width:14px; height:14px; background:#fff; border-radius:50%; top:3px; left:3px; transition:left .2s; }
.toggle-switch.on::after { left:19px; }

/* BUTTONS */
.btn { font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:.04em; padding:10px 22px; border-radius:8px; border:none; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:7px; }
.btn-primary { background:var(--soufflage); color:#000; }
.btn-primary:hover { background:#33dcff; transform:translateY(-1px); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-sm { padding:7px 14px; font-size:12px; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--muted2); }
.btn-ghost:hover { border-color:var(--border2); color:var(--text); }
.btn-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.save-ok { color:var(--ok); font-size:13px; display:none; }
.save-ok.show { display:flex; align-items:center; gap:6px; }

/* TABLE */
.table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; }
thead th { font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); padding:12px 16px; text-align:left; background:var(--surface); border-bottom:1px solid var(--border); white-space:nowrap; }
tbody tr { border-bottom:1px solid rgba(37,46,66,.5); transition:background .15s; }
tbody tr:hover { background:rgba(0,212,255,.03); }
tbody tr:last-child { border:none; }
tbody td { padding:12px 16px; font-size:13px; vertical-align:middle; }
.td-num { font-family:var(--font-display); font-size:15px; font-weight:700; }

/* CHAT */
#page-chat { padding:0; height:calc(100vh - 56px); display:none; flex-direction:column; }
#page-chat.active { display:flex; }
.chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
.chat-msg { display:flex; gap:10px; align-items:flex-end; animation:fadeIn .2s ease; }
.chat-msg.own { flex-direction:row-reverse; }
.chat-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; color:#000; }
.chat-bubble { max-width:65%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
.chat-msg:not(.own) .chat-bubble { background:var(--card); border:1px solid var(--border); border-bottom-left-radius:4px; }
.chat-msg.own .chat-bubble { background:var(--soufflage); color:#000; border-bottom-right-radius:4px; }
.chat-meta { font-size:10px; color:var(--muted); margin-top:3px; display:block; }
.chat-msg.own .chat-meta { text-align:right; }
.chat-system { text-align:center; font-size:11px; color:var(--muted); padding:3px 0; }
.chat-alert-msg { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25); border-radius:8px; padding:10px 14px; font-size:13px; color:var(--danger); }
.chat-input-area { border-top:1px solid var(--border); padding:14px 20px; background:var(--bg2); display:flex; gap:10px; align-items:center; }
.chat-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:22px; padding:10px 18px; font-family:var(--font-body); font-size:14px; color:var(--text); outline:none; transition:border-color .2s; }
.chat-input:focus { border-color:var(--soufflage); }
.chat-send { width:42px; height:42px; background:var(--soufflage); border:none; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .2s; color:#000; }
.chat-send:hover { background:#33dcff; transform:scale(1.05); }

/* ALERTS */
.alert-item { display:flex; align-items:flex-start; gap:12px; padding:14px; background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; }
.alert-item.unread { border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.05); }
.alert-icon { font-size:22px; }
.alert-body { flex:1; }
.alert-body strong { display:block; font-size:13px; margin-bottom:4px; }
.alert-body p { font-size:12px; color:var(--muted); }
.alert-time { font-size:11px; color:var(--muted); white-space:nowrap; }

/* INLINE TABS */
.inline-tabs { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:4px; width:fit-content; margin-bottom:18px; flex-wrap:wrap; }
.itab { padding:7px 16px; border-radius:5px; font-family:var(--font-display); font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--muted); transition:all .2s; }
.itab.active { background:var(--soufflage); color:#000; }

/* FILTER */
.filter-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.filter-row .form-input, .filter-row .form-select { padding:8px 12px; font-size:13px; width:auto; }

  --remplissage: #00ff94;
  --etiquette: #ffb800;
  --emballage: #ff6b35;
  --admin: #c084fc;
  --ok: #22c55e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--font-body); background:var(--bg); color:var(--text); font-size:14px; }

/* ══════════ LOADER ══════════ */
#loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999;
}
.loader-logo { font-family:var(--font-display); font-size:48px; font-weight:900; letter-spacing:2px; margin-bottom:24px; text-align:center; line-height:1.2; }
.loader-logo span { color:var(--soufflage); }
.loader-logo small { font-size:16px; display:block; color:var(--muted); font-weight:400; letter-spacing:2px; margin-top:4px; }
.loader-bar { width:200px; height:3px; background:var(--surface); border-radius:2px; overflow:hidden; }
.loader-fill { height:100%; background:var(--soufflage); border-radius:2px; animation:loadFill 1.5s ease forwards; }
.loader-txt { font-size:12px; color:var(--muted); margin-top:12px; letter-spacing:.1em; }
@keyframes loadFill { from{width:0} to{width:100%} }

/* ══════════ LOGIN ══════════ */
#loginScreen {
  position:fixed; inset:0; display:none;
  align-items:center; justify-content:center;
  background:var(--bg); z-index:1000;
}
#loginScreen.show { display:flex; }
#loginScreen::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%, rgba(0,212,255,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 50%, rgba(0,255,148,.05) 0%, transparent 60%);
}
.login-box {
  position:relative; width:440px;
  background:var(--card); border:1px solid var(--border2);
  border-radius:16px; padding:44px 40px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  animation:fadeUp .4s ease;
}
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .brand { font-family:var(--font-display); font-size:40px; font-weight:900; letter-spacing:1px; line-height:1.2; }
.login-logo .brand span { color:var(--soufflage); }
.login-logo .brand small { font-size:14px; display:block; color:var(--muted); font-weight:400; letter-spacing:2px; margin-top:4px; }
.login-logo .sub { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-top:8px; }

.login-label { font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:8px; }
.login-input {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:12px 16px;
  font-family:var(--font-body); font-size:15px; color:var(--text);
  outline:none; transition:border-color .2s, box-shadow .2s; margin-bottom:16px;
}
.login-input:focus { border-color:var(--soufflage); box-shadow:0 0 0 3px rgba(0,212,255,.1); }

.user-select { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
.user-chip {
  padding:10px 12px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface); cursor:pointer; transition:all .2s; text-align:left;
}
.user-chip:hover { border-color:var(--border2); }
.user-chip.selected { border-color:var(--soufflage); background:rgba(0,212,255,.08); }
.user-chip .chip-name { font-weight:600; font-size:13px; }
.user-chip .chip-role { font-size:11px; color:var(--muted); margin-top:2px; }
.chip-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }

.forgot-password {
  text-align: right;
  margin-bottom: 16px;
}
.forgot-link {
  color: var(--soufflage);
  font-size: 12px;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s;
}
.forgot-link:hover {
  opacity: 0.8;
  text-decoration: underline;
}

.btn-login {
  width:100%; padding:14px; background:var(--soufflage); color:#000;
  border:none; border-radius:8px; font-family:var(--font-display);
  font-size:16px; font-weight:700; letter-spacing:.05em; cursor:pointer; transition:all .2s;
}
.btn-login:hover { background:#33dcff; transform:translateY(-1px); }
.btn-login:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-secondary {
  width:100%; padding:12px; background:transparent; color:var(--text);
  border:1px solid var(--border); border-radius:8px; font-family:var(--font-display);
  font-size:14px; font-weight:600; letter-spacing:.05em; cursor:pointer; transition:all .2s; margin-top:10px;
}
.btn-secondary:hover { border-color:var(--border2); background:var(--surface); }
.login-err { color:var(--danger); font-size:12px; text-align:center; margin:10px 0; min-height:18px; }
.login-success { color:var(--ok); font-size:12px; text-align:center; margin:10px 0; min-height:18px; }

/* RESET PASSWORD MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal.show {
  display: flex;
}
.modal-content {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 32px;
  width: 90%;
  max-width: 400px;
  animation: fadeUp 0.3s ease;
}
.modal-content h3 {
  font-family: var(--font-display);
  font-size: 24px;
  margin-bottom: 16px;
}
.modal-content p {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 20px;
}
.modal-close {
  float: right;
  font-size: 24px;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.2s;
}
.modal-close:hover {
  color: var(--text);
}

/* ══════════ APP LAYOUT (identique à l'original) ══════════ */
#app {
  display:none; height:100vh;
  grid-template-columns:64px 220px 1fr;
  grid-template-rows:56px 1fr;
  grid-template-areas:"icon topbar topbar" "icon sidebar main";
}
#app.show { display:grid; }

/* ICON BAR */
.icon-bar {
  grid-area:icon; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; z-index:10;
}
.brand-mini { font-family:var(--font-display); font-size:22px; font-weight:900; color:var(--soufflage); margin-bottom:16px; }
.nav-icon {
  width:42px; height:42px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:19px; cursor:pointer; transition:all .2s;
  color:var(--muted); background:none; border:none; position:relative;
}
.nav-icon:hover { background:var(--surface); color:var(--text); }
.nav-icon.active { background:var(--surface); color:var(--soufflage); }
.nav-icon .nbadge {
  position:absolute; top:5px; right:5px; width:8px; height:8px;
  background:var(--danger); border-radius:50%; border:2px solid var(--bg2);
}

/* TOPBAR */
.topbar {
  grid-area:topbar; background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 20px 0 0; z-index:9;
}
.topbar-title { font-family:var(--font-display); font-size:20px; font-weight:700; letter-spacing:.05em; padding:0 20px; }
.topbar-date { font-size:12px; color:var(--muted); padding:0 20px; border-left:1px solid var(--border); }
.topbar-right { display:flex; align-items:center; gap:12px; }

.presence-pills { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.presence-pill {
  display:flex; align-items:center; gap:5px; padding:3px 9px;
  border-radius:20px; border:1px solid var(--border);
  font-size:11px; font-weight:500; background:var(--surface); transition:all .3s;
}
.presence-pill.online { border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.08); color:var(--ok); }
.pdot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
.presence-pill.online .pdot { background:var(--ok); box-shadow:0 0 6px var(--ok); animation:pulse 2s infinite; }

.user-badge {
  display:flex; align-items:center; gap:10px; padding:5px 12px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px; cursor:pointer; transition:all .2s;
}
.user-badge:hover { border-color:var(--danger); }
.udot { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#000; }
.uname { font-size:13px; font-weight:600; }
.urole { font-size:11px; color:var(--muted); }

/* SIDEBAR */
.sidebar { grid-area:sidebar; background:var(--bg2); border-right:1px solid var(--border); overflow-y:auto; padding:12px 0; }
.sidebar-label { font-size:10px; text-transform:uppercase; letter-spacing:.15em; color:var(--muted); padding:8px 18px 5px; }
.sidebar-item {
  display:flex; align-items:center; gap:10px; padding:9px 18px;
  cursor:pointer; transition:all .15s; font-size:13px; font-weight:500;
  color:var(--muted2); border-left:2px solid transparent; position:relative;
}
.sidebar-item:hover { background:var(--surface); color:var(--text); }
.sidebar-item.active { background:var(--surface); color:var(--text); border-left-color:var(--soufflage); }
.si-icon { font-size:15px; width:20px; text-align:center; }
.si-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; }
.machine-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sidebar-divider { height:1px; background:var(--border); margin:10px 18px; }

/* MAIN (identique à l'original) */
.main { grid-area:main; overflow-y:auto; background:var(--bg); }
.page { display:none; padding:24px; animation:fadeIn .25s ease; }
.page.active { display:block; }

/* PAGE HEADER */
.page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px; padding-bottom:18px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
.page-header h2 { font-family:var(--font-display); font-size:28px; font-weight:900; letter-spacing:.02em; }
.page-header p { color:var(--muted); font-size:13px; margin-top:4px; }

/* CARD */
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
.card-title { font-family:var(--font-display); font-size:15px; font-weight:700; letter-spacing:.04em; margin-bottom:16px; display:flex; align-items:center; gap:8px; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; position:relative; }
.stat-box::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; border-radius:0 0 10px 10px; }
.stat-box.s1::after{background:var(--soufflage)} .stat-box.s2::after{background:var(--remplissage)}
.stat-box.s3::after{background:var(--etiquette)} .stat-box.s4::after{background:var(--emballage)}
.sval { font-family:var(--font-display); font-size:30px; font-weight:900; line-height:1; }
.slabel { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
.ssub { font-size:11px; color:var(--muted); margin-top:6px; }

/* MACHINE CARDS */
.machines-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:18px; }
.machine-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; position:relative; overflow:hidden; transition:border-color .2s; }
.machine-card:hover { border-color:var(--border2); }
.mc-accent { position:absolute; top:0; left:0; right:0; height:3px; }
.mc-soufflage .mc-accent{background:var(--soufflage)} .mc-remplissage .mc-accent{background:var(--remplissage)}
.mc-etiquette .mc-accent{background:var(--etiquette)} .mc-emballage .mc-accent{background:var(--emballage)}
.mc-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
.mc-name { font-family:var(--font-display); font-size:17px; font-weight:700; letter-spacing:.03em; }
.mc-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.status-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; display:flex; align-items:center; gap:5px; white-space:nowrap; }
.status-badge.ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.status-badge.warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.status-badge.danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.sdot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.mc-metrics { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.mm-label { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:3px; }
.mm-val { font-family:var(--font-display); font-size:22px; font-weight:700; }
.mc-soufflage .mm-val{color:var(--soufflage)} .mc-remplissage .mm-val{color:var(--remplissage)}
.mc-etiquette .mm-val{color:var(--etiquette)} .mc-emballage .mm-val{color:var(--emballage)}
.mc-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); }

/* FORM */
.form-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-label { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
.form-input,.form-select,.form-textarea {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; font-family:var(--font-body); font-size:14px; color:var(--text);
  outline:none; transition:border-color .2s, box-shadow .2s; width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--soufflage); box-shadow:0 0 0 2px rgba(0,212,255,.1); }
.form-select option { background:var(--surface); }
.form-textarea { resize:vertical; min-height:80px; }

.alert-toggle {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2);
  border-radius:8px; font-size:13px; cursor:pointer; transition:all .2s; margin-bottom:16px;
}
.toggle-switch {
  width:36px; height:20px; background:var(--surface); border-radius:10px;
  position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; border:none;
}
.toggle-switch.on { background:var(--danger); }
.toggle-switch::after { content:''; position:absolute; width:14px; height:14px; background:#fff; border-radius:50%; top:3px; left:3px; transition:left .2s; }
.toggle-switch.on::after { left:19px; }

/* BUTTONS */
.btn { font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:.04em; padding:10px 22px; border-radius:8px; border:none; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:7px; }
.btn-primary { background:var(--soufflage); color:#000; }
.btn-primary:hover { background:#33dcff; transform:translateY(-1px); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-sm { padding:7px 14px; font-size:12px; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--muted2); }
.btn-ghost:hover { border-color:var(--border2); color:var(--text); }
.btn-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.save-ok { color:var(--ok); font-size:13px; display:none; }
.save-ok.show { display:flex; align-items:center; gap:6px; }

/* TABLE */
.table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; }
thead th { font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); padding:12px 16px; text-align:left; background:var(--surface); border-bottom:1px solid var(--border); white-space:nowrap; }
tbody tr { border-bottom:1px solid rgba(37,46,66,.5); transition:background .15s; }
tbody tr:hover { background:rgba(0,212,255,.03); }
tbody tr:last-child { border:none; }
tbody td { padding:12px 16px; font-size:13px; vertical-align:middle; }
.td-num { font-family:var(--font-display); font-size:15px; font-weight:700; }

/* CHAT */
#page-chat { padding:0; height:calc(100vh - 56px); display:none; flex-direction:column; }
#page-chat.active { display:flex; }
.chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
.chat-msg { display:flex; gap:10px; align-items:flex-end; animation:fadeIn .2s ease; }
.chat-msg.own { flex-direction:row-reverse; }
.chat-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; color:#000; }
.chat-bubble { max-width:65%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
.chat-msg:not(.own) .chat-bubble { background:var(--card); border:1px solid var(--border); border-bottom-left-radius:4px; }
.chat-msg.own .chat-bubble { background:var(--soufflage); color:#000; border-bottom-right-radius:4px; }
.chat-meta { font-size:10px; color:var(--muted); margin-top:3px; display:block; }
.chat-msg.own .chat-meta { text-align:right; }
.chat-system { text-align:center; font-size:11px; color:var(--muted); padding:3px 0; }
.chat-alert-msg { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25); border-radius:8px; padding:10px 14px; font-size:13px; color:var(--danger); }
.chat-input-area { border-top:1px solid var(--border); padding:14px 20px; background:var(--bg2); display:flex; gap:10px; align-items:center; }
.chat-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:22px; padding:10px 18px; font-family:var(--font-body); font-size:14px; color:var(--text); outline:none; transition:border-color .2s; }
.chat-input:focus { border-color:var(--soufflage); }
.chat-send { width:42px; height:42px; background:var(--soufflage); border:none; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .2s; color:#000; }
.chat-send:hover { background:#33dcff; transform:scale(1.05); }

/* ALERTS */
.alert-item { display:flex; align-items:flex-start; gap:12px; padding:14px; background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; }
.alert-item.unread { border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.05); }
.alert-icon { font-size:22px; }
.alert-body { flex:1; }
.alert-body strong { display:block; font-size:13px; margin-bottom:4px; }
.alert-body p { font-size:12px; color:var(--muted); }
.alert-time { font-size:11px; color:var(--muted); white-space:nowrap; }

/* INLINE TABS */
.inline-tabs { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:4px; width:fit-content; margin-bottom:18px; flex-wrap:wrap; }
.itab { padding:7px 16px; border-radius:5px; font-family:var(--font-display); font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--muted); transition:all .2s; }
.itab.active { background:var(--soufflage); color:#000; }

/* FILTER */
.filter-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.filter-row .form-input, .filter-row .form-select { padding:8px 12px; font-size:13px; width:auto; }

/* CHART */
.chart-wrap { position:relative
