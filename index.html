.admin-accordion { margin-bottom:10px; border-radius:14px; border:1px solid var(--border); overflow:hidden; transition:all .3s; }
.admin-accordion-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; cursor:pointer; background:var(--card);
  user-select:none; transition:background .2s;
}
.admin-accordion-header:hover { background:var(--surface); }
.admin-accordion-header .acc-title { font-family:var(--font-display); font-size:15px; font-weight:700; display:flex; align-items:center; gap:10px; }
.admin-accordion-header .acc-arrow { font-size:12px; color:var(--muted); transition:transform .3s; }
.admin-accordion-header.open .acc-arrow { transform:rotate(180deg); }
.admin-accordion-body { display:none; padding:0 16px 16px; background:var(--card); border-top:1px solid var(--border); }
.admin-accordion-body.open { display:block; animation:fadeIn .2s ease; }

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { font-family:var(--font-body); background:var(--bg); color:var(--text); font-size:15px; }

#app-scaler {
  width: 1024px;
  height: 100vh;
  transform-origin: top left;
  overflow: hidden;
}

#loginScreen {
  position:fixed; inset:0; display:none;
  align-items:center; justify-content:center;
  background:var(--bg);
  z-index:1000;
  overflow-y:auto;
  padding:20px;
}
#loginScreen.show { display:flex; }
.login-box {
  position:relative; width:100%; max-width:440px;
  background:var(--card); border:1px solid var(--border2);
  border-radius:16px; padding:32px 28px;
  box-shadow:0 8px 40px rgba(0,0,0,.12);
  animation:fadeUp .4s ease;
  margin:auto;
}
.login-logo { text-align:center; margin-bottom:24px; }
.login-logo .brand { font-family:var(--font-display); font-size:32px; font-weight:900; letter-spacing:1px; color:var(--text); }
.login-logo .brand span { color:var(--soufflage); }
.login-logo .sub { font-size:12px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-top:4px; }

.login-label { font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:6px; font-weight:600; }
.login-input {
  width:100%; background:var(--surface); border:1.5px solid var(--border);
  border-radius:10px; padding:12px 14px;
  font-family:var(--font-body); font-size:16px; color:var(--text);
  outline:none; transition:border-color .2s; margin-bottom:12px;
}
.login-input:focus { border-color:var(--soufflage); box-shadow:0 0 0 3px rgba(0,153,204,.1); }

.btn-login {
  width:100%; padding:14px; background:var(--soufflage); color:#fff;
  border:none; border-radius:10px; font-family:var(--font-display);
  font-size:17px; font-weight:700; letter-spacing:.05em; cursor:pointer; transition:all .2s;
  margin-top:4px;
}
.btn-login:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-login:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.login-err { font-size:13px; text-align:center; margin-top:10px; min-height:18px; color:var(--danger); }

#loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999;
}
.loader-logo { font-family:var(--font-display); font-size:52px; font-weight:900; letter-spacing:3px; margin-bottom:24px; }
.loader-logo span { color:var(--soufflage); }
.loader-bar { width:200px; height:3px; background:var(--surface); border-radius:2px; overflow:hidden; }
.loader-fill { height:100%; background:var(--soufflage); border-radius:2px; animation:loadFill 1.5s ease forwards; }
.loader-txt { font-size:12px; color:var(--muted); margin-top:12px; letter-spacing:.1em; }
@keyframes loadFill { from{width:0} to{width:100%} }

#loginScreen {
  position:fixed; inset:0; display:none;
  align-items:center; justify-content:center;
  background:#000; z-index:1000;
  overflow-y:auto; padding:20px;
}
#loginScreen.show { display:flex; }
#loginSlides {
  position:absolute; inset:0; z-index:0;
}
#loginSlides img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:contain; object-position:center;
  background:#000;
}
#loginScreen::before {
  content:''; position:absolute; inset:0; z-index:1;
  background:rgba(0,0,0,.55);
}
.login-box {
  position:relative; width:440px; z-index:2;
  background:rgba(255,255,255,.95); border:1px solid rgba(255,255,255,.3);
  border-radius:16px; padding:44px 40px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  animation:fadeUp .4s ease;
}
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .brand { font-family:var(--font-display); font-size:44px; font-weight:900; letter-spacing:2px; color:#1a2030; }
.login-logo .brand span { color:var(--soufflage); }
.login-logo .sub { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#7a8599; margin-top:4px; }

.login-label { font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:#7a8599; margin-bottom:8px; }
.login-input {
  width:100%; background:#f0f4f8; border:1px solid #e2e6ed;
  border-radius:8px; padding:12px 16px;
  font-family:var(--font-body); font-size:15px; color:#1a2030;
  outline:none; transition:border-color .2s, box-shadow .2s; margin-bottom:16px;
}
.login-input:focus { border-color:var(--soufflage); box-shadow:0 0 0 3px rgba(0,153,204,.1); }

.user-select { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
.user-chip {
  padding:10px 12px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface); cursor:pointer; transition:all .2s; text-align:left;
}
.user-chip:hover { border-color:var(--border2); }
.user-chip.selected { border-color:var(--soufflage); background:rgba(0,212,255,.08); }
.user-chip .chip-name { font-weight:600; font-size:13px; }
.user-chip .chip-role { font-size:11px; color:var(--muted); margin-top:2px; }
.chip-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }

#app {
  display:none; height:100vh;
  grid-template-columns:64px 220px 1fr;
  grid-template-rows:60px 1fr;
  grid-template-areas:"icon topbar topbar" "icon sidebar main";
}
#app.show { display:grid; }

.icon-bar {
  grid-area:icon; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; z-index:10;
}
.brand-mini { font-family:var(--font-display); font-size:15px; font-weight:900; color:var(--soufflage); margin-bottom:16px; }
.nav-icon {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; cursor:pointer; transition:all .2s;
  color:var(--muted); background:none; border:none; position:relative;
}
.nav-icon:hover { background:var(--surface); color:var(--text); }
.nav-icon.active { background:rgba(0,153,204,.15); color:var(--soufflage); }
.nav-icon .nbadge {
  position:absolute; top:5px; right:5px; width:8px; height:8px;
  background:var(--danger); border-radius:50%; border:2px solid var(--bg2);
}

.topbar {
  grid-area:topbar; background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 20px 0 0; z-index:9;
  box-shadow:0 1px 8px rgba(0,0,0,.2);
}
.topbar-title { font-family:var(--font-display); font-size:22px; font-weight:700; letter-spacing:.05em; padding:0 20px; color:var(--text); }
.topbar-date { font-size:13px; color:var(--muted); padding:0 20px; border-left:1px solid var(--border); }
.topbar-right { display:flex; align-items:center; gap:12px; }

.user-menu-wrap { position:relative; }
.user-badge {
  display:flex; align-items:center; gap:10px; padding:6px 14px;
  background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
  cursor:pointer; transition:all .2s; user-select:none;
}
.user-badge:hover { border-color:var(--soufflage); background:var(--bg2); }
.udot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:#fff; flex-shrink:0; }
.uname { font-size:14px; font-weight:600; color:var(--text); }
.urole { font-size:11px; color:var(--muted); }

.user-dropdown {
  position:absolute; top:calc(100% + 8px); right:0; width:200px;
  background:var(--card); border:1px solid var(--border2); border-radius:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.35); z-index:100;
  overflow:hidden; display:none;
}
.user-dropdown.open { display:block; animation:fadeIn .15s ease; }
.ud-item {
  display:flex; align-items:center; gap:10px; padding:12px 16px;
  font-size:14px; font-weight:500; cursor:pointer; transition:background .15s; color:var(--text);
  border:none; background:none; width:100%; text-align:left;
}
.ud-item:hover { background:var(--surface); }
.ud-item.danger { color:var(--danger); }
.ud-item.danger:hover { background:rgba(239,68,68,.08); }
.ud-divider { height:1px; background:var(--border); margin:4px 0; }

.presence-pills { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.presence-pill {
  display:flex; align-items:center; gap:5px; padding:3px 9px;
  border-radius:20px; border:1px solid var(--border);
  font-size:11px; font-weight:500; background:var(--surface); transition:all .3s;
}
.presence-pill.online { border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.08); color:var(--ok); }
.pdot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
.presence-pill.online .pdot { background:var(--ok); box-shadow:0 0 6px var(--ok); animation:pulse 2s infinite; }

.user-badge {
  display:flex; align-items:center; gap:10px; padding:5px 12px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px; cursor:pointer; transition:all .2s;
}
.user-badge:hover { border-color:var(--soufflage); }
.udot { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; }
.uname { font-size:13px; font-weight:600; color:var(--text); }
.urole { font-size:11px; color:var(--muted); }

.sidebar { grid-area:sidebar; background:var(--bg2); border-right:1px solid var(--border); overflow-y:auto; padding:12px 0; }
.sidebar-label { font-size:10px; text-transform:uppercase; letter-spacing:.15em; color:var(--muted); padding:8px 18px 5px; }
.sidebar-item {
  display:flex; align-items:center; gap:10px; padding:9px 18px;
  cursor:pointer; transition:all .15s; font-size:13px; font-weight:500;
  color:var(--muted2); border-left:2px solid transparent; position:relative;
}
.sidebar-item:hover { background:var(--surface); color:var(--text); }
.sidebar-item.active { background:var(--surface); color:var(--text); border-left-color:var(--soufflage); }
.si-icon { font-size:15px; width:20px; text-align:center; }
.si-badge { margin-left:auto; background:var(--danger); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; }
.machine-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sidebar-divider { height:1px; background:var(--border); margin:10px 18px; }

.main { grid-area:main; overflow:hidden; background:var(--bg); display:flex; flex-direction:column; height:100%; }
.page { display:none; padding:24px; animation:fadeIn .25s ease; flex:1; overflow-y:auto; height:100%; }
.page.active { display:block; }

#page-chat {
  padding:0 !important;
  display:none;
  flex-direction:row;
  flex:1;
  overflow:hidden;
  height:100%;
  background:var(--bg);
}
#page-chat.active { display:flex !important; }

#chatContactsPanel {
  width:320px; min-width:320px; max-width:320px;
  border-right:1px solid var(--border);
  background:var(--card); display:flex; flex-direction:column;
  height:100%; flex-shrink:0;
}

@media(max-width:700px) {
  #chatContactsPanel { width:100% !important; min-width:100% !important; max-width:100% !important; }
  #chatConvPanel { position:fixed !important; top:0; left:0; right:0; bottom:0; z-index:600; display:none !important; flex-direction:column; background:var(--card); }
  #chatConvPanel.mobile-open { display:flex !important; }
  #chatBackBtn { display:flex !important; }
}
.chat-messages {
  flex:1;
  overflow-y:auto;
  padding:16px 20px;
  display:flex;
  flex-direction:column;
  gap:8px;
  min-height:0;
  -webkit-overflow-scrolling:touch;
}
.chat-msg { display:flex; gap:10px; align-items:flex-end; animation:fadeIn .2s ease; }
.chat-msg.own { flex-direction:row-reverse; }
.chat-avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; color:#fff; }
.chat-bubble { max-width:70%; padding:10px 14px; border-radius:16px; font-size:15px; line-height:1.5; word-break:break-word; }
.chat-msg:not(.own) .chat-bubble { background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:4px; color:var(--text); }
.chat-msg.own .chat-bubble { background:var(--soufflage); color:#fff; border-bottom-right-radius:4px; }
.chat-meta { font-size:11px; color:var(--muted); margin-top:4px; display:block; }
.chat-msg.own .chat-meta { text-align:right; }
.chat-system { text-align:center; font-size:12px; color:var(--muted); padding:4px 0; background:transparent; }
.chat-alert-msg { background:rgba(220,38,38,.08); border:1px solid rgba(220,38,38,.2); border-radius:10px; padding:10px 14px; font-size:13px; color:var(--danger); }
.chat-input-area {
  display:flex;
  gap:10px;
  align-items:center;
  padding:12px 16px;
  background:var(--card);
