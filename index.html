<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LineOps Industrie</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Barlow',sans-serif;background:#0a0c10;color:#fff}
.container{padding:16px}
.card{background:#141824;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #222}
h1{font-size:20px}
input,select{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:10px;background:#1c2333;color:#fff}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#ff7a00;color:#fff}
.hidden{display:none}
.online{color:#00ff94;font-size:12px}
.offline{color:#888;font-size:12px}
</style>
</head>

<body>

<div id="auth" class="container">
  <div class="card">
    <h1>Connexion / Inscription</h1>
    <input id="name" placeholder="Nom">
    <input id="pass" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
  </div>
</div>

<div id="app" class="container hidden">

  <h1>📊 Production</h1>

  <div class="card">
    <b>👷 Employés en ligne</b>
    <div id="users"></div>
  </div>

  <div class="card">
    <b>➕ Ajouter rapport</b>
    <input id="emp" placeholder="Employé">
    <select id="machine">
      <option>Soufflage</option>
      <option>Remplissage</option>
      <option>Étiquetage</option>
      <option>Emballage</option>
    </select>
    <input id="prod" placeholder="Production">
    <button onclick="addReport()">Ajouter</button>
  </div>

  <div class="card">
    <b>📋 Rapports</b>
    <div id="reports"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX",
  databaseURL: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const rtdb = firebase.database();

let currentUser="";

function login(){
  currentUser = name.value;
  if(!currentUser) return;

  auth.classList.add('hidden');
  app.classList.remove('hidden');

  setOnline();
  listenUsers();
  listenReports();
}

function setOnline(){
  let ref = rtdb.ref('status/'+currentUser);
  ref.set({online:true});
  ref.onDisconnect().set({online:false});
}

function listenUsers(){
  rtdb.ref('status').on('value',snap=>{
    users.innerHTML="";
    let data=snap.val()||{};
    Object.keys(data).forEach(u=>{
      let div=document.createElement('div');
      div.innerHTML = u + " - " + (data[u].online?"<span class='online'>EN LIGNE</span>":"<span class='offline'>OFFLINE</span>");
      users.appendChild(div);
    });
  });
}

function addReport(){
  let r={
    emp:emp.value,
    machine:machine.value,
    prod:Number(prod.value),
    time:Date.now()
  };
  if(!r.emp||!r.prod)return;
  db.collection('reports').add(r);
}

function listenReports(){
  db.collection('reports').orderBy('time','desc').onSnapshot(snap=>{
    reports.innerHTML="";
    snap.forEach(doc=>{
      let r=doc.data();
      let d=document.createElement('div');
      d.className='card';
      d.innerHTML=`${r.emp} - ${r.machine} - ${r.prod}`;
      reports.appendChild(d);
    });
  });
}
</script>

</body>
</html>
